<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#10213C">
<title>건설사 신용·재무 조회</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  --ink:#11203A;--muted:#6A7588;--faint:#9AA4B5;--line:#E7EAF1;--bg:#EDF0F5;--card:#FFFFFF;
  --accent:#2563EB;--head:#10213C;
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
  color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;font-feature-settings:"tnum";
}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center}

/* 잠금 화면 */
.cl-lock{min-height:100vh;width:100%;max-width:520px;display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:24px;text-align:center}
.cl-lock-mark{width:62px;height:62px;border-radius:18px;background:var(--head);display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:22px;box-shadow:0 10px 28px rgba(16,33,60,.25)}
.cl-lock-t{font-size:20px;font-weight:800;letter-spacing:-.02em}
.cl-lock-s{font-size:13.5px;color:var(--muted);margin-top:8px;line-height:1.6}
.cl-lock-form{width:100%;max-width:300px;margin-top:26px}
.cl-code{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:15px 16px;font-size:17px;text-align:center;
  background:var(--card);color:var(--ink);font-weight:700;letter-spacing:.04em;outline:none;transition:border-color .15s,box-shadow .15s}
.cl-code:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.cl-code.err{border-color:#DC2626;box-shadow:0 0 0 3px rgba(220,38,38,.12)}
.cl-enter{width:100%;border:0;background:var(--head);color:#fff;font-size:16px;font-weight:700;padding:15px;border-radius:13px;margin-top:11px;cursor:pointer}
.cl-enter:active{opacity:.9}
.cl-lock-err{color:#DC2626;font-size:13px;font-weight:600;margin-top:12px;min-height:18px}

/* 헤더 */
.cl-header{position:sticky;top:0;z-index:30;width:100%;background:var(--head);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px}
.cl-header-in{max-width:520px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.cl-title{color:#fff;font-size:17px;font-weight:700;letter-spacing:-.02em}
.cl-meta{color:#9FB0CC;font-size:12.5px;margin-top:3px;font-weight:500;display:flex;align-items:center;gap:6px}
.cl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:#5CC489}
.cl-dot.warn{background:#E0A53B}.cl-dot.sync{background:#7FA8E8;animation:cl-pulse 1s infinite}
@keyframes cl-pulse{0%,100%{opacity:.4}50%{opacity:1}}
.cl-actions{display:flex;gap:6px;flex-shrink:0}
.cl-hbtn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.10);color:#DCE6F8;border-radius:10px;cursor:pointer}
.cl-hbtn:active{background:rgba(255,255,255,.22)}
.cl-hbtn.spin svg{animation:cl-rot .8s linear infinite}
@keyframes cl-rot{to{transform:rotate(360deg)}}

/* 검색 */
.cl-searchwrap{position:sticky;top:0;z-index:20;width:100%;background:var(--bg);padding:12px 16px 8px;border-bottom:1px solid var(--line)}
.cl-search{max-width:520px;margin:0 auto;display:flex;align-items:center;gap:9px;background:var(--card);border:1.5px solid var(--line);
  border-radius:13px;padding:0 12px;box-shadow:0 1px 2px rgba(16,33,60,.04);transition:border-color .15s,box-shadow .15s}
.cl-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.cl-search-ico{color:var(--faint);display:flex;flex-shrink:0}
.cl-search:focus-within .cl-search-ico{color:var(--accent)}
.cl-input{flex:1;border:0;outline:0;background:transparent;font-size:16px;color:var(--ink);padding:13px 0;font-weight:500;min-width:0}
.cl-input::placeholder{color:var(--faint);font-weight:500}
.cl-clear{border:0;background:transparent;color:var(--faint);display:flex;padding:6px;cursor:pointer;margin-right:-4px}

.cl-list{flex:1;width:100%;max-width:520px;padding:12px 16px 40px;overflow-y:auto}
.cl-count{font-size:12.5px;color:var(--muted);font-weight:600;padding:2px 2px 10px}
.cl-card{display:flex;align-items:center;gap:10px;width:100%;text-align:left;cursor:pointer;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:14px 13px 14px 15px;margin-bottom:9px;box-shadow:0 1px 2px rgba(16,33,60,.035);transition:transform .08s,border-color .15s}
.cl-card:active{transform:scale(.985);border-color:#D5DBE6}
.cl-card-main{flex:1;min-width:0}
.cl-card-name{font-size:15.5px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-card-sub{display:flex;align-items:center;gap:8px;margin-top:6px;min-width:0}
.cl-pill{flex-shrink:0;font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:7px;border:1px solid}
.cl-card-loc{font-size:12.5px;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-card-tag{flex-shrink:0;font-size:11px;font-weight:700;padding:4px 8px;border-radius:8px;border:1px solid;white-space:nowrap}
.cl-card-chev{color:#C4CCDA;display:flex;flex-shrink:0;margin-left:-2px}

.cl-empty{text-align:center;padding:64px 28px 40px;color:var(--muted)}
.cl-empty-mark{width:56px;height:56px;border-radius:16px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--accent);margin:0 auto 18px;box-shadow:0 2px 8px rgba(16,33,60,.05)}
.cl-empty-t{font-size:16px;font-weight:700;color:var(--ink)}
.cl-empty-s{font-size:13.5px;margin-top:8px;line-height:1.6}
.cl-info{padding:13px 14px;border-radius:12px;font-size:13.5px;line-height:1.5;margin-bottom:12px;font-weight:500}
.cl-info-err{background:#FCE4E4;color:#B5302A;border:1px solid #F3C4C2}

/* 상세 */
.cl-detail{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;flex-direction:column;animation:cl-slide .22s ease}
@keyframes cl-slide{from{transform:translateX(14px);opacity:.6}to{transform:translateX(0);opacity:1}}
.cl-detail-bar{position:sticky;top:0;z-index:5;background:var(--head);display:flex;align-items:flex-start;gap:6px;padding:calc(env(safe-area-inset-top,0px) + 12px) 14px 14px 8px}
.cl-detail-head{flex:1;min-width:0;padding-top:1px}
.cl-detail-name{color:#fff;font-size:18px;font-weight:800;letter-spacing:-.02em;line-height:1.25}
.cl-bizno{display:inline-flex;align-items:center;gap:5px;margin-top:5px;background:transparent;border:0;cursor:pointer;color:#A9BAD6;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;padding:0}
.cl-bizno:active{color:#fff}
.cl-iconbtn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;border:0;background:transparent;color:#fff;cursor:pointer;border-radius:10px}
.cl-iconbtn:active{background:rgba(255,255,255,.14)}
.cl-detail-body{flex:1;overflow-y:auto;max-width:520px;width:100%;margin:0 auto;padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 40px)}
.cl-grades{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.cl-gchip{border:1px solid;border-radius:13px;padding:11px 13px;display:flex;flex-direction:column;gap:3px}
.cl-gchip-l{font-size:11.5px;font-weight:600;color:var(--muted)}
.cl-gchip-v{font-size:18px;font-weight:800;letter-spacing:-.01em;line-height:1.1;word-break:break-all}
.cl-sec{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:6px 15px 8px;margin-bottom:12px;box-shadow:0 1px 2px rgba(16,33,60,.035)}
.cl-sec-t{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.02em;margin:12px 0 6px}
.cl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:10px 0;border-top:1px solid #F1F3F8}
.cl-sec-t + .cl-row{border-top:0}
.cl-row-l{font-size:13.5px;color:var(--muted);font-weight:500;flex-shrink:0;padding-top:1px}
.cl-row-v{font-size:14.5px;font-weight:600;text-align:right;color:var(--ink);min-width:0;word-break:break-word}
.cl-num{font-variant-numeric:tabular-nums;font-weight:700;font-size:15px}
.cl-with-ico,.cl-link{display:inline-flex;align-items:center;gap:6px;justify-content:flex-end}
.cl-rico{color:var(--faint);flex-shrink:0}
.cl-link{color:var(--accent);text-decoration:none;font-weight:700}
.cl-link .cl-rico{color:var(--accent)}
.cl-email{word-break:break-all}
.cl-dash{color:var(--faint)}
.cl-block{padding:10px 0 4px;border-top:1px solid #F1F3F8}
.cl-block-l{font-size:13.5px;color:var(--muted);font-weight:500;margin-bottom:8px}
.cl-tags{display:flex;flex-wrap:wrap;gap:6px}
.cl-tag{font-size:12.5px;font-weight:600;padding:5px 9px;border-radius:8px;background:#F1F3F8;color:#465062;border:1px solid #E7EAF1;line-height:1.3}
.cl-tag-a{background:var(--card);border-color:#D8E2F7;color:#2B4675}
.cl-footnote{font-size:11.5px;color:var(--faint);line-height:1.5;padding:6px 4px 0}

.cl-toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 26px);transform:translateX(-50%);z-index:80;background:#11203A;color:#fff;font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:11px;box-shadow:0 8px 24px rgba(13,24,44,.3);max-width:88%;text-align:center;animation:cl-tin .2s ease}
@keyframes cl-tin{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
@media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important}}
</style>
</head>

/* ---------- 유틸 ---------- */
function norm(s){return String(s==null?"":s).replace(/\s+/g,"").toLowerCase();}
var CANON_BY_NORM={}; FIELDS.forEach(function(f){CANON_BY_NORM[norm(f)]=f;});
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function isEmpty(v){return v===""||v==null;}
function fmtInt(v){if(isEmpty(v))return "—";var n=Number(v);return isNaN(n)?String(v):Math.round(n).toLocaleString("ko-KR");}
function fmtPct(v){if(isEmpty(v))return "—";var n=Number(v);if(isNaN(n))return String(v);return (Math.round(n*10)/10).toLocaleString("ko-KR")+"%";}
function fmtBiz(v){var d=String(v==null?"":v).replace(/\D/g,"");return d.length===10?(d.slice(0,3)+"-"+d.slice(3,5)+"-"+d.slice(5)):(String(v||"—"));}
function fmtPhone(v){var raw=String(v==null?"":v).trim();var d=raw.replace(/\D/g,"");if(d.length===11)return d.slice(0,3)+"-"+d.slice(3,7)+"-"+d.slice(7);if(d.length===10&&d.indexOf("02")===0)return d.slice(0,2)+"-"+d.slice(2,6)+"-"+d.slice(6);return raw;}
function splitList(v){if(isEmpty(v))return [];return String(v).split(/[,\n]/).map(function(s){return s.trim();}).filter(Boolean);}
function hashCode(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)+s.charCodeAt(i);return (h>>>0).toString(36);}

/* ---------- 등급 색상 ---------- */
var C={green:{bg:"#E7F6EC",fg:"#0F7A37",bd:"#BFE6CC"},blue:{bg:"#E8EFFE",fg:"#1D4FD8",bd:"#C9DAFB"},indigo:{bg:"#ECEBFB",fg:"#5446C7",bd:"#D5D1F4"},amber:{bg:"#FCF1DC",fg:"#A66A06",bd:"#F0DCB0"},orange:{bg:"#FCE9DD",fg:"#B5511A",bd:"#F2CFB6"},red:{bg:"#FCE4E4",fg:"#C0322B",bd:"#F3C4C2"},gray:{bg:"#EEF1F5",fg:"#5C6678",bd:"#DCE1EA"}};
function colorFor(type,value){
  var s=String(value==null?"":value).toUpperCase().trim();
  if(!s)return C.gray;
  if(type==="등급분류"){if(s.indexOf("정규")>=0)return C.green;if(s.indexOf("예비")>=0)return C.amber;if(s.indexOf("제한")>=0)return C.red;return C.gray;}
  if(type==="Risk등급"){if(/NRM/.test(s))return C.indigo;var m=s.match(/R-?(\d)/);if(m){var n=+m[1];if(n<=2)return C.green;if(n===3)return C.blue;if(n===4)return C.amber;return C.red;}return C.gray;}
  if(type==="현금흐름등급"){if(s[0]==="A")return C.green;if(s[0]==="B")return C.blue;if(s[0]==="C")return C.amber;if(s[0]==="D")return C.red;return C.gray;}
  if(/^A/.test(s))return C.green;if(/^BBB/.test(s))return C.blue;if(/^BB/.test(s))return C.indigo;if(/^B/.test(s))return C.amber;if(/^C/.test(s))return C.orange;if(/^D/.test(s))return C.red;return C.gray;
}

/* ---------- 저장소(있으면 사용) ---------- */
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);return true;}catch(e){return false;}}
function lsDel(k){try{localStorage.removeItem(k);}catch(e){}}
function isUnlockedStored(){return lsGet("cl_unlock")===hashCode(ACCESS_CODE);}
function setUnlockedStored(){lsSet("cl_unlock",hashCode(ACCESS_CODE));}
function getCache(){try{var r=lsGet("cl_data");if(!r)return null;return {data:JSON.parse(r),meta:JSON.parse(lsGet("cl_meta")||"null")};}catch(e){return null;}}
function setCache(d,m){lsSet("cl_data",JSON.stringify(d));lsSet("cl_meta",JSON.stringify(m));}

/* ---------- 압축 해제 ---------- */
function gunzipB64(b64){
  var bin=atob(b64), bytes=new Uint8Array(bin.length), i;
  for(i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  if(typeof DecompressionStream==="undefined")return Promise.reject(new Error("no ds"));
  var stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
  return new Response(stream).arrayBuffer().then(function(buf){return JSON.parse(new TextDecoder().decode(buf));});
}

/* ---------- 데이터 파싱 ---------- */
function parseCSV(text){
  var rows=[],row=[],field="",inQ=false,i,ch;
  for(i=0;i<text.length;i++){ch=text[i];
    if(inQ){if(ch==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}else field+=ch;}
    else{if(ch==='"')inQ=true;else if(ch===","){row.push(field);field="";}else if(ch==="\n"){row.push(field);rows.push(row);row=[];field="";}else if(ch==="\r"){}else field+=ch;}
  }
  if(field!==""||row.length){row.push(field);rows.push(row);}
  return rows;
}
function rowsToData(rows){
  var hr=-1,best=-1,r,sc;
  for(r=0;r<Math.min(rows.length,8);r++){sc=(rows[r]||[]).filter(function(h){return CANON_BY_NORM[norm(h)];}).length;if(sc>best){best=sc;hr=r;}}
  if(hr<0||best<3)throw new Error("형식 인식 실패");
  var header=rows[hr],idxToKey={};
  header.forEach(function(h,i){var k=CANON_BY_NORM[norm(h)];if(k)idxToKey[i]=k;});
  var keys=Object.keys(idxToKey).map(function(i){return idxToKey[i];});
  if(keys.indexOf("업체명")<0)throw new Error("'업체명' 열 없음");
  var out=[],i2;
  for(r=hr+1;r<rows.length;r++){
    var row=rows[r];if(!row||!row.some(function(c){return String(c==null?"":c).trim()!=="";}))continue;
    var o={};FIELDS.forEach(function(f){o[f]="";});
    for(i2 in idxToKey){var v=row[i2];o[idxToKey[i2]]=(v==null?"":v);}
    if(String(o["업체명"]).trim()===""&&String(o["사업자번호"]).trim()==="")continue;
    out.push(o);
  }
  if(!out.length)throw new Error("데이터 행 없음");
  return out;
}
function parseXlsx(buf){
  if(typeof XLSX==="undefined")throw new Error("엑셀 모듈 미로드");
  var wb=XLSX.read(buf,{type:"array"}),bestRows=null,bestScore=-1;
  wb.SheetNames.forEach(function(sn){
    var rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:"",blankrows:false}),s=-1,r,sc;
    for(r=0;r<Math.min(rows.length,8);r++){sc=(rows[r]||[]).filter(function(h){return CANON_BY_NORM[norm(h)];}).length;if(sc>s)s=sc;}
    if(s>bestScore){bestScore=s;bestRows=rows;}
  });
  return rowsToData(bestRows||[]);
}
function fetchLive(){
  var isCSV=/\.csv($|\?)|output=csv|tqx=out:csv/i.test(DATA_URL);
  var bust=(DATA_URL.indexOf("?")>=0?"&":"?")+"_t="+Date.now();
  return fetch(DATA_URL+bust,{cache:"no-store"}).then(function(res){
    if(!res.ok)throw new Error("HTTP "+res.status);
    return isCSV?res.text().then(function(t){return rowsToData(parseCSV(t));}):res.arrayBuffer().then(function(b){return parseXlsx(b);});
  });
}

/* ---------- 검색 ---------- */
function getResults(){
  var q=query.trim();if(!q)return null;
  var qL=q.toLowerCase(),qD=q.replace(/\D/g,""),out=[],i,c,name,hit;
  for(i=0;i<DATA.length;i++){
    c=DATA[i];name=String(c["업체명"]||"");
    hit=name.toLowerCase().indexOf(qL)>=0;
    if(!hit&&qD.length>=2)hit=String(c["사업자번호"]||"").replace(/\D/g,"").indexOf(qD)>=0;
    if(hit)out.push({c:c,i:i});
  }
  out.sort(function(a,b){return String(a.c["업체명"]||"").localeCompare(String(b.c["업체명"]||""),"ko");});
  return out;
}

/* ---------- 토스트 ---------- */
var toastT;
function toast(msg){
  var old=document.querySelector(".cl-toast");if(old)old.remove();
  var el=document.createElement("div");el.className="cl-toast";el.textContent=msg;document.body.appendChild(el);
  clearTimeout(toastT);toastT=setTimeout(function(){el.remove();},2200);
}
function copy(text,label){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){toast((label||"")+" 복사됨");},function(){toast("복사할 수 없습니다");});}
  else toast("복사할 수 없습니다");
}

/* ---------- 메타/동기화 표시 ---------- */
function metaText(){
  var p=[];if(META.count)p.push(META.count.toLocaleString("ko-KR")+"개사");
  var s="";
  if(syncing)s="동기화 중…";
  else if(META.source==="온라인"&&META.updatedAt){var d=new Date(META.updatedAt);s=d.getMonth()+1+"/"+d.getDate()+" "+("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2)+" 동기화";}
  else if(META.source==="저장본")s="저장본 표시";
  else s="기본 데이터";
  return {count:p.join(""),sync:s};
}
function updateMeta(){
  var m=document.getElementById("cl-meta");if(!m)return;
  var t=metaText(),dot=syncing?"sync":(META.source==="온라인"?"":(META.source==="저장본"?"warn":"warn"));
  m.innerHTML='<span class="cl-dot '+dot+'"></span>'+esc(t.count?(t.count+" · "+t.sync):t.sync);
}

  +'<div class="cl-lock-form">'

  +'<button id="cl-enter" class="cl-enter">들어가기</button>'
  +'<div id="cl-lockerr" class="cl-lock-err"></div>'
  +'</div></div>';
  var input=document.getElementById("cl-code");

    var v=input.value.trim();

  }
  document.getElementById("cl-enter").addEventListener("click",attempt);

  input.addEventListener("input",function(){input.classList.remove("err");document.getElementById("cl-lockerr").textContent="";});
  setTimeout(function(){input.focus();},100);
}

/* ---------- 동기화 ---------- */
function syncLive(manual){
  if(syncing)return;
  syncing=true;updateMeta();
  var rb=document.getElementById("cl-refresh");if(rb)rb.classList.add("spin");
  fetchLive().then(function(arr){
    DATA=arr;META={count:arr.length,source:"온라인",updatedAt:new Date().toISOString()};
    setCache(DATA,META);syncing=false;
    var rb2=document.getElementById("cl-refresh");if(rb2)rb2.classList.remove("spin");
    updateMeta();updateResults();
    if(manual)toast(arr.length.toLocaleString("ko-KR")+"개사 · 최신 동기화 완료");
  }).catch(function(err){
    syncing=false;
    var rb2=document.getElementById("cl-refresh");if(rb2)rb2.classList.remove("spin");
    if(META.source!=="온라인"&&META.source!=="저장본")META.source="기본 데이터";
    updateMeta();
    if(manual)toast("동기화 실패 — 인터넷·데이터 주소를 확인하세요");
  });
}

/* ---------- 부팅 ---------- */
function boot(){
  var shown=false,cache=getCache();
  if(cache&&cache.data&&cache.data.length){DATA=cache.data;META=cache.meta||{count:cache.data.length,source:"저장본"};if(META.source==="온라인")META.source="저장본";shown=true;renderList();syncLive(false);return;}
  gunzipB64(SEED_B64).then(function(arr){DATA=arr;META={count:arr.length,source:"기본 데이터",period:SEED_DATE};renderList();syncLive(false);},function(){DATA=[];META={count:0};renderList();syncLive(false);});
}

/* ---------- 시작 ---------- */
function init(){
  if(unlocked||isUnlockedStored()){unlocked=true;boot();}
  else renderLock();
}

document.addEventListener('keydown', function (e) {
  if (e.key === 'F12') e.preventDefault();
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'u') e.preventDefault();
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key.toLowerCase() === 'i' || e.key.toLowerCase() === 'j')) e.preventDefault();
});
  
init();

})();
</script>
